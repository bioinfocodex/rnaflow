# Netlify configuration for RNAflow download site
# Deploy the `website/` folder to rnaflow.bioinfocodex.com

[build]
  publish = "website"   # serve files from the website/ folder

# ── Redirect /rnaflow → root (in case they link from main site) ──
[[redirects]]
  from  = "/rnaflow"
  to    = "/"
  status = 301

# ── Security headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=(), camera=()"

# ── Cache static assets aggressively ──
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
